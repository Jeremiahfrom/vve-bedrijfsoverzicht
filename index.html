<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VvE Beheer Collectief — Bedrijfsoverzicht</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1f2d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VvE Dashboard">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0d1f2d;
      --gold: #c8a96e;
      --cream: #f5f0e8;
      --gold-15: rgba(200,169,110,0.15);
      --gold-25: rgba(200,169,110,0.25);
      --gold-40: rgba(200,169,110,0.40);
      --cream-85: rgba(245,240,232,0.85);
      --cream-50: rgba(245,240,232,0.50);
      --cream-30: rgba(245,240,232,0.30);
      --radius: 12px;
      --radius-sm: 7px;
    }

    body {
      background: var(--navy);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    #app { max-width: 860px; margin: 0 auto; padding: 28px 20px 60px; }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .app-title {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: -0.01em;
      color: var(--cream);
    }

    .app-title em { color: var(--gold); font-style: italic; }

    .view-toggle {
      display: flex;
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }

    .toggle-btn {
      padding: 6px 16px;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--cream-50);
      cursor: pointer;
      background: none;
      border: none;
      letter-spacing: 0.03em;
      transition: color 0.15s, background 0.15s;
    }

    .toggle-btn.active { background: var(--gold-15); color: var(--gold); }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .edit-btn {
      padding: 6px 14px;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--gold);
      background: var(--gold-15);
      border: 1px solid var(--gold-40);
      cursor: pointer;
      transition: background 0.15s;
    }
    .edit-btn:hover { background: var(--gold-25); }

    .edit-done-btn {
      padding: 6px 14px;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: #5dd9a0;
      background: rgba(93,217,160,0.12);
      border: 1px solid rgba(93,217,160,0.35);
      cursor: pointer;
      transition: background 0.15s;
    }
    .edit-done-btn:hover { background: rgba(93,217,160,0.2); }

    /* ── Canvas ─────────────────────────────────────────────────────────────── */
    #canvas-container {
      position: relative;
      width: 100%;
      min-height: 220px;
      margin-bottom: 16px;
      background-image: radial-gradient(circle, rgba(200,169,110,0.12) 1px, transparent 1px);
      background-size: 24px 24px;
      border-radius: var(--radius);
      border: 1px solid rgba(200,169,110,0.1);
    }
    #canvas-nodes {
      position: relative;
      width: 100%;
      min-height: 220px;
    }
    .pillar-node {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      user-select: none;
      padding: 12px;
      border-radius: 14px;
      border: 1.5px solid transparent;
      width: 100px;
      transition: border-color 0.2s, background 0.15s;
    }
    .pillar-node:hover { border-color: rgba(200,169,110,0.35); background: rgba(200,169,110,0.04); }
    .pillar-node.active { border-color: var(--gold); background: rgba(200,169,110,0.08); }
    .pillar-node.dragging { opacity: 0.5; cursor: grabbing; }
    .node-ring-wrap { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
    .node-ring-wrap svg { width: 64px; height: 64px; transform: rotate(-90deg); }
    .node-ring-pct {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
    }
    .node-icon {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; pointer-events: none;
    }
    .node-name {
      font-family: 'Fraunces', serif;
      font-size: 13px; font-weight: 400;
      text-align: center; color: var(--cream);
      line-height: 1.2; max-width: 90px; word-break: break-word;
    }
    .node-count { font-size: 10px; color: var(--cream-50); text-align: center; }
    .node-edit-controls { display: none; gap: 4px; margin-top: 4px; }
    .node-edit-btn {
      width: 24px; height: 24px; border-radius: 5px;
      background: rgba(200,169,110,0.1); border: 1px solid rgba(200,169,110,0.2);
      color: rgba(200,169,110,0.7); font-size: 11px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .node-edit-btn:hover { background: var(--gold-25); color: var(--gold); }
    .node-edit-btn.delete-confirm { background: rgba(220,60,60,0.18); color: #e07070; border-color: rgba(220,60,60,0.3); }
    .pillar-edit-form {
      position: absolute;
      bottom: calc(100% + 8px); left: 50%;
      transform: translateX(-50%);
      background: #162535;
      border: 1px solid rgba(200,169,110,0.3);
      border-radius: 10px; padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
      width: 180px; z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .pillar-edit-form input[type=text] {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(200,169,110,0.3); border-radius: 5px;
      padding: 5px 9px; font-family: 'DM Sans', sans-serif;
      font-size: 12px; color: var(--cream); outline: none; width: 100%;
    }
    .pillar-edit-form input[type=text]:focus { border-color: var(--gold); }
    .color-swatches { display: flex; gap: 5px; flex-wrap: wrap; }
    .color-swatch {
      width: 20px; height: 20px; border-radius: 50%;
      cursor: pointer; border: 2px solid transparent;
      transition: border-color 0.15s, transform 0.1s;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: white; }
    .pillar-edit-save {
      padding: 5px; border-radius: 5px;
      background: var(--gold-25); border: 1px solid var(--gold-40);
      color: var(--gold); font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 600; cursor: pointer;
    }
    .pillar-edit-save:hover { background: var(--gold-40); }
    .legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--cream-50); margin-right: 12px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .add-pillar-node {
      position: absolute; width: 80px; padding: 12px 8px;
      border-radius: 14px; border: 1.5px dashed rgba(200,169,110,0.3);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; cursor: pointer; opacity: 0.7; top: 60px;
      transition: opacity 0.15s, border-color 0.15s;
    }
    .add-pillar-node:hover { opacity: 1; border-color: var(--gold); }
    .add-pillar-icon { font-size: 22px; color: var(--gold); line-height: 1; }
    .add-pillar-label { font-size: 10px; color: rgba(200,169,110,0.7); }

    /* ── Detail Panel ───────────────────────────────────────────────────────── */
    #detail-panel {
      background: rgba(200,169,110,0.05);
      border: 1px solid rgba(200,169,110,0.2);
      border-radius: var(--radius);
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.25s;
    }
    #detail-panel.open { opacity: 1; }
    .detail-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 200px;
    }
    .detail-col { padding: 16px; display: flex; flex-direction: column; gap: 4px; }
    .detail-col-left { border-right: 1px solid rgba(200,169,110,0.12); }
    .detail-col-header {
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(200,169,110,0.6); margin-bottom: 8px;
    }
    .breadcrumb {
      display: flex; align-items: center; gap: 4px;
      font-size: 10px; flex-wrap: wrap; margin-bottom: 8px; min-height: 16px;
    }
    .breadcrumb-crumb { color: var(--gold); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }
    .breadcrumb-sep { color: rgba(245,240,232,0.3); }
    .breadcrumb-current { color: rgba(245,240,232,0.7); }
    .task-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 9px;
      background: rgba(255,255,255,0.03);
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }
    .task-row:hover { background: rgba(255,255,255,0.06); }
    .task-row.selected { background: rgba(200,169,110,0.1); border-color: rgba(200,169,110,0.35); }
    .task-check {
      width: 16px; height: 16px;
      border: 1.5px solid rgba(200,169,110,0.4); border-radius: 3px;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 10px; transition: background 0.15s, border-color 0.15s;
    }
    .task-check.done { background: var(--gold); border-color: var(--gold); color: var(--navy); }
    .task-check.done::after { content: '✓'; font-weight: 900; }
    .task-check.auto { opacity: 0.6; cursor: default; }
    .task-label { flex: 1; font-size: 12px; color: var(--cream-85); line-height: 1.35; }
    .task-label.done { text-decoration: line-through; color: var(--cream-30); }
    .task-label-input {
      flex: 1; background: rgba(255,255,255,0.08);
      border: 1px solid var(--gold-40); border-radius: 4px;
      padding: 2px 7px; font-family: 'DM Sans', sans-serif;
      font-size: 12px; color: var(--cream); outline: none;
    }
    .task-label-input:focus { border-color: var(--gold); }
    .task-chevron { font-size: 10px; color: rgba(245,240,232,0.3); flex-shrink: 0; }
    .task-chevron.has-children { color: var(--gold); }
    .task-icons {
      display: flex; gap: 3px; flex-shrink: 0;
      opacity: 0; transition: opacity 0.15s;
    }
    .task-row:hover .task-icons,
    .task-row:focus-within .task-icons { opacity: 1; }
    .task-icon {
      width: 22px; height: 22px; border-radius: 4px;
      background: rgba(200,169,110,0.07); border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; cursor: pointer; color: rgba(200,169,110,0.55);
      transition: background 0.15s, color 0.15s;
    }
    .task-icon:hover { background: var(--gold-15); color: var(--gold); }
    .task-icon.delete-confirm { background: rgba(220,60,60,0.18); color: #e07070; }
    .btn-add-task {
      margin-top: 4px; padding: 6px 10px;
      border-radius: var(--radius-sm); border: 1px dashed rgba(200,169,110,0.3);
      background: none; font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 500; color: rgba(200,169,110,0.6);
      cursor: pointer; text-align: left;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-add-task:hover { border-color: var(--gold); color: var(--gold); }
    .detail-empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: rgba(245,240,232,0.2); text-align: center; padding: 24px;
    }

    /* ── Roadmap ────────────────────────────────────────────────────────────── */
    #roadmap-view { padding-top: 4px; }
    #roadmap-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; font-size: 12px; color: var(--cream-50); }
    .phase-item { display: flex; gap: 16px; margin-bottom: 0; }
    .phase-marker { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 40px; }
    .phase-dot {
      width: 40px; height: 40px; border-radius: 50%;
      border: 2px solid rgba(200,169,110,0.35); background: rgba(200,169,110,0.08);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fraunces', serif; font-size: 15px; font-weight: 400; color: var(--gold); flex-shrink: 0;
    }
    .phase-dot.future { border-color: rgba(200,169,110,0.15); background: transparent; color: rgba(200,169,110,0.25); }
    .phase-connector { width: 2px; flex: 1; min-height: 16px; background: rgba(200,169,110,0.1); margin-top: 4px; }
    .phase-content { flex: 1; padding-bottom: 24px; padding-top: 6px; }
    .phase-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .phase-name-label { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 400; color: var(--cream); }
    .phase-name-label.future { color: var(--cream-50); }
    .phase-edit-controls { display: none; gap: 4px; }
    .phase-edit-btn {
      padding: 2px 8px; border-radius: 4px;
      background: rgba(200,169,110,0.08); border: 1px solid rgba(200,169,110,0.2);
      color: rgba(200,169,110,0.6); font-size: 10px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    }
    .phase-edit-btn:hover { background: var(--gold-15); color: var(--gold); }
    .phase-edit-btn.delete-confirm { background: rgba(220,60,60,0.18); color: #e07070; }
    .phase-drop-zone { display: flex; flex-wrap: wrap; gap: 5px; min-height: 28px; padding: 4px; border-radius: 5px; border: 1.5px dashed transparent; transition: border-color 0.15s, background 0.15s; }
    .phase-drop-zone.drag-over { border-color: rgba(200,169,110,0.5); background: rgba(200,169,110,0.06); }
    .phase-tag {
      padding: 3px 9px; border-radius: 4px; font-size: 11px; font-weight: 500;
      border: 1px solid transparent; cursor: grab; user-select: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .phase-tag:hover { transform: translateY(-1px); }
    .phase-tag.dragging { opacity: 0.4; }
    .phase-tag.tag-done { text-decoration: line-through; opacity: 0.4; cursor: default; }
    .tag-empty { font-size: 11px; color: var(--cream-30); font-style: italic; }
    .btn-add-phase {
      margin-top: 16px; padding: 7px 16px; border-radius: 6px;
      border: 1.5px dashed rgba(200,169,110,0.25); background: none;
      font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
      color: rgba(200,169,110,0.55); cursor: pointer; display: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-add-phase:hover { border-color: var(--gold); color: var(--gold); }

    /* RESET */
    .reset-section {
      margin-top: 44px;
      padding-top: 20px;
      border-top: 1px solid rgba(200,169,110,0.1);
      text-align: center;
    }

    .btn-reset {
      background: none;
      border: 1px solid rgba(200,169,110,0.18);
      border-radius: 6px;
      padding: 7px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--cream-50);
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-reset:hover { border-color: rgba(200,60,60,0.45); color: #e07070; }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      header { flex-direction: column; align-items: flex-start; }
      .header-controls { width: 100%; justify-content: space-between; }
      #canvas-container {
        background-image: none;
        min-height: unset;
        border: none;
      }
      #canvas-nodes {
        display: grid !important;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        padding: 8px;
        min-height: unset;
        position: static !important;
      }
      .pillar-node { position: static !important; width: auto; }
      .add-pillar-node { position: static !important; width: auto; }
      .detail-split { grid-template-columns: 1fr; }
      .detail-col-left { border-right: none; border-bottom: 1px solid rgba(200,169,110,0.12); }
    }

/* ── Mindmap ────────────────────────────────────────────────────────────── */
#mindmap-view {
  display: flex;
  flex-direction: row;
  height: calc(100vh - 72px);
  margin: -28px -20px -60px;
  position: relative;
}

/* Left palette */
.mm-palette {
  width: 72px;
  background: var(--navy);
  border-right: 1px solid rgba(200,169,110,0.15);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 14px 0;
  gap: 6px;
  flex-shrink: 0;
  z-index: 5;
}
.mm-palette-label {
  font-size: 9px;
  color: rgba(200,169,110,0.45);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.mm-palette-item {
  width: 48px;
  height: 48px;
  background: rgba(200,169,110,0.06);
  border: 1px solid rgba(200,169,110,0.18);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: grab;
  font-size: 18px;
  gap: 2px;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  user-select: none;
}
.mm-palette-item:hover {
  background: rgba(200,169,110,0.16);
  border-color: var(--gold);
  transform: scale(1.06);
}
.mm-palette-item span { font-size: 8px; color: rgba(245,240,232,0.45); }
.mm-palette-divider { width: 40px; height: 1px; background: rgba(200,169,110,0.14); margin: 3px 0; }

/* Canvas wrapper — scrollable */
.mm-canvas-wrap {
  flex: 1;
  overflow: auto;
  position: relative;
  background:
    radial-gradient(ellipse at 25% 15%, rgba(200,169,110,0.05) 0%, transparent 55%),
    #0a1520;
  background-image:
    radial-gradient(ellipse at 25% 15%, rgba(200,169,110,0.05) 0%, transparent 55%),
    radial-gradient(circle, rgba(200,169,110,0.11) 1px, transparent 1px);
  background-size: auto, 32px 32px;
}

/* Large canvas surface */
#mm-canvas {
  position: relative;
  width: 2000px;
  height: 1200px;
}
#mm-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  overflow: visible;
}

/* Hub node */
.mm-hub {
  position: absolute;
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, #c8a96e, #a8894e);
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 0 6px rgba(200,169,110,0.12), 0 8px 32px rgba(200,169,110,0.28);
  font-size: 11px;
  font-weight: 700;
  color: #0d1f2d;
  text-align: center;
  line-height: 1.25;
  cursor: move;
  user-select: none;
  font-family: 'Fraunces', serif;
  z-index: 2;
}

/* Pillar nodes */
.mm-pillar {
  position: absolute;
  background: rgba(13,31,45,0.96);
  border: 1.5px solid var(--gold);
  border-radius: 14px;
  padding: 10px 13px;
  min-width: 120px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 0 1px rgba(200,169,110,0.08);
  cursor: move;
  user-select: none;
  z-index: 2;
}
.mm-pillar-header { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; }
.mm-pillar-emoji { font-size: 16px; }
.mm-pillar-name { font-size: 12px; font-weight: 700; color: var(--gold); }
.mm-pillar-bar-wrap { width: 100%; height: 3px; background: rgba(200,169,110,0.14); border-radius: 2px; margin-bottom: 4px; }
.mm-pillar-bar { height: 100%; border-radius: 2px; transition: width 0.4s; }
.mm-pillar-count { font-size: 9px; color: rgba(245,240,232,0.4); }
.mm-pillar-toggle {
  font-size: 9px;
  color: rgba(200,169,110,0.5);
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  margin-top: 5px;
  display: block;
  width: 100%;
  text-align: left;
  transition: color 0.15s;
}
.mm-pillar-toggle:hover { color: var(--gold); }

/* Task pill nodes */
.mm-task {
  position: absolute;
  background: rgba(200,169,110,0.07);
  border: 1px solid rgba(200,169,110,0.22);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 10px;
  color: rgba(245,240,232,0.75);
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: move;
  user-select: none;
  white-space: nowrap;
  z-index: 2;
  max-width: 160px;
  transition: border-color 0.15s;
}
.mm-task:hover { border-color: rgba(200,169,110,0.5); }

/* Connection line highlight */

/* Right side panel */

<body>

  <script>
    // ─── Constants ────────────────────────────────────────────────────────────────
    const STORAGE_KEY_V2 = 'vve-dashboard-v2';
    const STORAGE_KEY_MM = 'vve-mindmap-v1';
    let mmData = loadMindmapData();  // mindmap state: { positions, freeNodes, connections }

    function loadMindmapData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY_MM);
        if (raw) return JSON.parse(raw);
      } catch {}
      return { positions: {}, freeNodes: [], connections: [] };
    }
    function saveMindmapData() {
      localStorage.setItem(STORAGE_KEY_MM, JSON.stringify(mmData));
    }
    function renderMindmap() {
      // implemented in Task 4
    }

    const STORAGE_KEY_V1 = 'vve-dashboard-v1';
    const PRESET_COLORS = ['#c8a96e','#6aabf7','#5dd9a0','#e07070','#c47ed4','#f0c060'];

    const DEFAULT_DATA = {
      activePillar: null,
      pillars: [

          ]
        },
        {
          id: 'website', icon: '🌐', label: 'Nieuwe Website', color: '#6aabf7',
          position: { x: 280, y: 60 },
          tasks: [
            { id: 'w1', label: 'Homepage', done: true, phase: 1, children: [] },
            { id: 'w2', label: 'Over ons pagina', done: false, phase: 1, children: [] },
            { id: 'w3', label: 'Pakketten pagina', done: false, phase: 2, children: [] },
            { id: 'w4', label: 'Contact pagina', done: false, phase: 2, children: [] },
            { id: 'w5', label: 'Schademelding formulier', done: false, phase: 2, children: [] },
            {
              id: 'w6', label: "Diensten subpagina's", done: false, phase: 2,
              children: [
                { id: 'w6-1', label: 'Loodgieterij', done: false, phase: null, children: [] },
                { id: 'w6-2', label: 'Electra', done: false, phase: null, children: [] },
                { id: 'w6-3', label: 'Dakdekkers', done: false, phase: null, children: [] },
                { id: 'w6-4', label: 'Schilderwerk', done: false, phase: null, children: [] }
              ]
            },
            { id: 'w7', label: 'SEO & meta tags', done: false, phase: 3, children: [] },
            { id: 'w8', label: 'Live zetten (DNS / hosting)', done: false, phase: 4, children: [] }
          ]
        },
        {
          id: 'automation', icon: '⚡', label: 'Automation', color: '#5dd9a0',
          position: { x: 500, y: 60 },
          tasks: [
            { id: 'a1', label: 'Schademeldingen workflow (n8n)', done: false, phase: 3, children: [] },
            { id: 'a2', label: 'Klantonboarding workflow', done: false, phase: 3, children: [] },
            { id: 'a3', label: 'Factuur- & debiteurenproces', done: false, phase: 3, children: [] },
            { id: 'a4', label: 'E-mail templates & reminders', done: false, phase: 3, children: [] },
            { id: 'a5', label: 'Vergadering & notulen workflow', done: false, phase: 4, children: [] },
            { id: 'a6', label: 'Maandrapportage automatiseren', done: false, phase: 4, children: [] }
          ]
        }
      ],
      phases: [
        { id: 1, label: 'Fase 1 — Fundament', order: 0 },
        { id: 2, label: 'Fase 2 — Uitbouwen', order: 1 },
        { id: 3, label: 'Fase 3 — Automation', order: 2 },
        { id: 4, label: 'Fase 4 — Lanceren & Schalen', order: 3 }
      ]
    };

    // ─── State ────────────────────────────────────────────────────────────────────
    let state;

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY_V2);
        if (raw) return JSON.parse(raw);
        const v1raw = localStorage.getItem(STORAGE_KEY_V1);
        if (v1raw) return migrateV1(JSON.parse(v1raw));
        return deepClone(DEFAULT_DATA);
      } catch { return deepClone(DEFAULT_DATA); }
    }

    function saveData() { localStorage.setItem(STORAGE_KEY_V2, JSON.stringify(state)); }
    function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }
    function getPillar(id) { return state.pillars.find(p => p.id === id); }

    // ─── Utils ────────────────────────────────────────────────────────────────────
    function generateId() { return Math.random().toString(36).slice(2, 9); }

    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = String(str);
      return d.innerHTML;
    }

    // Recursively count leaf tasks and how many are done
    function countLeaves(tasks) {
      let total = 0, done = 0;
      for (const t of tasks) {
        if (!t.children || t.children.length === 0) {
          total++; if (t.done) done++;
        } else {
          const sub = countLeaves(t.children);
          total += sub.total; done += sub.done;
        }
      }
      return { total, done };
    }

    function calcProgress(pillar) {
      const { total, done } = countLeaves(pillar.tasks);
      return total === 0 ? 0 : Math.round(done / total * 100);
    }

    // Returns true when all leaf descendants of a task are done
    function allLeavesDone(task) {
      if (!task.children || task.children.length === 0) return task.done;
      return task.children.every(c => allLeavesDone(c));
    }

    // Find a task by id anywhere in the tree; returns { task, parent }
    function findTask(tasks, id) {
      for (const t of tasks) {
        if (t.id === id) return { task: t, parent: tasks };
        if (t.children && t.children.length > 0) {
          const found = findTask(t.children, id);
          if (found) return found;
        }
      }
      return null;
    }

    // Flatten all tasks in a tree to a single array
    function flattenTasks(tasks) {
      return tasks.flatMap(t => [t, ...flattenTasks(t.children || [])]);
    }

    // Remove a task by id from anywhere in a task tree; returns true if removed
    function removeTaskById(tasks, id) {
      const idx = tasks.findIndex(t => t.id === id);
      if (idx !== -1) { tasks.splice(idx, 1); return true; }
      for (const t of tasks) {
        if (t.children && removeTaskById(t.children, id)) return true;
      }
      return false;
    }

    // Convert hex color to rgba string
    function hexAlpha(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function migrateV1(v1) {
      const data = deepClone(DEFAULT_DATA);
      for (const v1p of (v1.pillars || [])) {
        const p = data.pillars.find(p2 => p2.id === v1p.id);
        if (!p) continue;
        for (const v1t of (v1p.tasks || [])) {
          const t = p.tasks.find(t2 => t2.id === v1t.id);
          if (t) { t.done = v1t.done; t.phase = v1t.phase; }
        }
      }
      data.activePillar = v1.activePillar || null;
      return data;
    }

    // ─── Edit Mode ────────────────────────────────────────────────────────────────
    let currentView = 'dashboard';
    let editMode = false;
    let selectedTaskId = null;
    let rightPath = [];

    function toggleEditMode() {
      editMode = !editMode;
      document.getElementById('edit-toggle-btn').style.display = editMode ? 'none' : '';
      document.getElementById('edit-done-btn').style.display = editMode ? '' : 'none';
      document.getElementById('add-pillar-node').style.display = editMode ? 'flex' : 'none';
      if (typeof renderCanvas === 'function') renderCanvas();
      if (state.activePillar && typeof renderDetailPanel === 'function') renderDetailPanel();
      if (typeof renderRoadmap === 'function') renderRoadmap();
    }

    // ─── Canvas ───────────────────────────────────────────────────────────────────
    const R_NODE = 26;
    const CIRC_NODE = +(2 * Math.PI * R_NODE).toFixed(1);

    function renderCanvas() {
      const container = document.getElementById('canvas-nodes');
      container.innerHTML = state.pillars.map(p => {
        const pct = calcProgress(p);
        const { total, done } = countLeaves(p.tasks);
        const offset = +(CIRC_NODE - CIRC_NODE * pct / 100).toFixed(1);
        const active = state.activePillar === p.id;
        const x = (p.position && p.position.x != null) ? p.position.x : 60;
        const y = (p.position && p.position.y != null) ? p.position.y : 60;
        return `
      <div class="pillar-node${active ? ' active' : ''}" id="node-${p.id}"
           style="left:${x}px;top:${y}px;" data-pillar-id="${p.id}">
        <div class="node-ring-wrap">
          <svg viewBox="0 0 64 64">
            <circle fill="none" stroke="rgba(200,169,110,0.15)" stroke-width="4" cx="32" cy="32" r="${R_NODE}"/>
            <circle fill="none" stroke="${escHtml(p.color)}" stroke-width="4" stroke-linecap="round"
              cx="32" cy="32" r="${R_NODE}"
              stroke-dasharray="${CIRC_NODE}" stroke-dashoffset="${offset}"
              style="transition:stroke-dashoffset 0.5s cubic-bezier(0.34,1.56,0.64,1)"/>
          </svg>
          <div class="node-icon">${escHtml(p.icon)}</div>
          <div class="node-ring-pct" style="color:${escHtml(p.color)}">${pct}%</div>
        </div>
        <div class="node-name">${escHtml(p.label)}</div>
        <div class="node-count">${done}/${total}</div>
        <div class="node-edit-controls" style="display:${editMode ? 'flex' : 'none'}">
          <button class="node-edit-btn" onclick="editPillar(event,'${p.id}')" title="Bewerken">✏</button>
          <button class="node-edit-btn" id="node-del-${p.id}"
            onclick="confirmDeletePillar(event,'${p.id}')" title="Verwijderen">🗑</button>
        </div>
      </div>`;
      }).join('');

      // Position add-pillar node after last pillar
      const addNode = document.getElementById('add-pillar-node');
      const lastPillar = state.pillars[state.pillars.length - 1];
      if (lastPillar && lastPillar.position) {
        addNode.style.left = (lastPillar.position.x + 120) + 'px';
        addNode.style.top = lastPillar.position.y + 'px';
      }

      attachNodeClickHandlers();
    }

    function attachNodeClickHandlers() {
      document.querySelectorAll('.pillar-node').forEach(el => {
        const pillarId = el.dataset.pillarId;
        let dragMoved = false;
        el.addEventListener('mousedown', e => {
          if (e.target.closest('.node-edit-controls')) return;
          dragMoved = false;
          initNodeDrag(e, el, pillarId, () => { dragMoved = true; });
        });
        el.addEventListener('click', e => {
          if (e.target.closest('.node-edit-controls')) return;
          if (!dragMoved) activatePillar(pillarId);
        });
      });
    }

    function initNodeDrag(e, el, pillarId, onMoved) {
      e.preventDefault();
      const startX = e.clientX;
      const startY = e.clientY;
      const pillar = getPillar(pillarId);
      const origX = (pillar.position && pillar.position.x != null) ? pillar.position.x : 0;
      const origY = (pillar.position && pillar.position.y != null) ? pillar.position.y : 0;
      let moved = false;

      function onMouseMove(ev) {
        const dx = ev.clientX - startX;
        const dy = ev.clientY - startY;
        if (!moved && Math.abs(dx) + Math.abs(dy) > 5) {
          moved = true;
          onMoved();
          el.classList.add('dragging');
        }
        if (!moved) return;
        el.style.left = Math.max(0, origX + dx) + 'px';
        el.style.top = Math.max(0, origY + dy) + 'px';
      }

      function onMouseUp(ev) {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        el.classList.remove('dragging');
        if (moved) {
          pillar.position = {
            x: Math.max(0, origX + (ev.clientX - startX)),
            y: Math.max(0, origY + (ev.clientY - startY))
          };
          saveData();
          // Reposition add-pillar node
          const addNode = document.getElementById('add-pillar-node');
          const lastPillar = state.pillars[state.pillars.length - 1];
          if (lastPillar && lastPillar.position) {
            addNode.style.left = (lastPillar.position.x + 120) + 'px';
            addNode.style.top = lastPillar.position.y + 'px';
          }
        }
      }

      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    }

    // ─── Pillar CRUD ──────────────────────────────────────────────────────────────
    const _pillarDeleteConfirm = new Set();
    const _pillarDeleteTimers = new Map();

    function editPillar(e, pillarId) {
      e.stopPropagation();
      document.querySelectorAll('.pillar-edit-form').forEach(f => f.remove());
      const p = getPillar(pillarId);
      if (!p) return;
      const node = document.getElementById(`node-${pillarId}`);

      const form = document.createElement('div');
      form.className = 'pillar-edit-form';
      form.innerHTML = `
        <input type="text" id="edit-icon-${escHtml(pillarId)}" value="${escHtml(p.icon)}" placeholder="Icoon (emoji)" maxlength="4">
        <input type="text" id="edit-label-${escHtml(pillarId)}" value="${escHtml(p.label)}" placeholder="Naam">
        <div class="color-swatches">
          ${PRESET_COLORS.map(c =>
            `<div class="color-swatch${c === p.color ? ' selected' : ''}" style="background:${escHtml(c)}" data-color="${escHtml(c)}"
                 onclick="this.closest('.color-swatches').querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));this.classList.add('selected')"></div>`
          ).join('')}
        </div>
        <button class="pillar-edit-save" onclick="savePillarEdit('${escHtml(pillarId)}')">Opslaan</button>`;

      node.appendChild(form);
      document.getElementById(`edit-label-${pillarId}`).focus();

      setTimeout(() => {
        document.addEventListener('click', function closeForm(ev) {
          if (!form.contains(ev.target)) {
            form.remove();
            document.removeEventListener('click', closeForm);
          }
        });
      }, 10);
    }

    function savePillarEdit(pillarId) {
      const p = getPillar(pillarId);
      if (!p) return;
      const icon = document.getElementById(`edit-icon-${pillarId}`).value.trim();
      const label = document.getElementById(`edit-label-${pillarId}`).value.trim();
      const selectedSwatch = document.querySelector(`#node-${pillarId} .color-swatch.selected`);
      if (icon) p.icon = icon;
      if (label) p.label = label;
      if (selectedSwatch) p.color = selectedSwatch.dataset.color;
      document.querySelectorAll('.pillar-edit-form').forEach(f => f.remove());
      saveData();
      renderCanvas();
      if (state.activePillar === pillarId) renderDetailPanel();
      renderRoadmapLegend();
    }

    function confirmDeletePillar(e, pillarId) {
      e.stopPropagation();
      const btn = document.getElementById(`node-del-${pillarId}`);
      if (!btn) return;
      if (_pillarDeleteConfirm.has(pillarId)) {
        clearTimeout(_pillarDeleteTimers.get(pillarId));
        _pillarDeleteTimers.delete(pillarId);
        state.pillars = state.pillars.filter(p => p.id !== pillarId);
        if (state.activePillar === pillarId) { state.activePillar = null; collapsePanel(); }
        _pillarDeleteConfirm.delete(pillarId);
        saveData();
        renderCanvas();
        renderRoadmapLegend();
      } else {
        _pillarDeleteConfirm.add(pillarId);
        btn.classList.add('delete-confirm');
        const timer = setTimeout(() => {
          _pillarDeleteConfirm.delete(pillarId);
          _pillarDeleteTimers.delete(pillarId);
          const b = document.getElementById(`node-del-${pillarId}`);
          if (b) b.classList.remove('delete-confirm');
        }, 2500);
        _pillarDeleteTimers.set(pillarId, timer);
      }
    }

    function addPillar() {
      const usedColors = state.pillars.map(p => p.color);
      const color = PRESET_COLORS.find(c => !usedColors.includes(c)) || PRESET_COLORS[0];
      const lastPillar = state.pillars[state.pillars.length - 1];
      const x = lastPillar ? (lastPillar.position.x + 130) : 60;
      const y = lastPillar ? lastPillar.position.y : 60;
      const newPillar = { id: generateId(), icon: '📌', label: 'Nieuwe pilaar', color, position: { x, y }, tasks: [] };
      state.pillars.push(newPillar);
      saveData();
      renderCanvas();
      setTimeout(() => {
        const btn = document.querySelector(`#node-${newPillar.id} .node-edit-btn`);
        if (btn) btn.click();
      }, 50);
    }

    function renderRoadmapLegend() {
      const legend = document.getElementById('roadmap-legend');
      if (!legend) return;
      legend.innerHTML = state.pillars.map(p =>
        `<div class="legend-item">
           <div class="legend-dot" style="background:${escHtml(p.color)}"></div>
           <span>${escHtml(p.icon)} ${escHtml(p.label)}</span>
         </div>`
      ).join('');
    }

    // ─── Detail Panel ─────────────────────────────────────────────────────────────
    function activatePillar(id) {
      if (state.activePillar === id) {
        state.activePillar = null;
        selectedTaskId = null;
        rightPath = [];
        collapsePanel();
      } else {
        state.activePillar = id;
        selectedTaskId = null;
        rightPath = [];
        renderCanvas();
        renderDetailPanel();
        expandPanel();
      }
      saveData();
    }

    function expandPanel() {
      const panel = document.getElementById('detail-panel');
      panel.classList.add('open');
      setTimeout(() => { panel.style.maxHeight = panel.scrollHeight + 300 + 'px'; }, 0);
    }

    function collapsePanel() {
      const panel = document.getElementById('detail-panel');
      panel.classList.remove('open');
      panel.style.maxHeight = '0';
      if (typeof renderCanvas === 'function') renderCanvas();
    }

    function renderDetailPanel() {
      if (!state.activePillar) return;
      const p = getPillar(state.activePillar);
      if (!p) return;
      const panel = document.getElementById('detail-panel');

      // Determine what the right column shows
      let rightTasks = null;
      if (rightPath.length > 0) {
        const deepTask = findTask(p.tasks, rightPath[rightPath.length - 1]);
        if (deepTask) rightTasks = deepTask.task.children;
      } else if (selectedTaskId) {
        const sel = findTask(p.tasks, selectedTaskId);
        if (sel) rightTasks = sel.task.children;
      }

      // Build breadcrumb HTML
      let crumbs = `<span class="breadcrumb-crumb" onclick="resetRightPanel()">${escHtml(p.icon)} ${escHtml(p.label)}</span>`;
      if (selectedTaskId) {
        const sel = findTask(p.tasks, selectedTaskId);
        if (sel) {
          if (rightPath.length > 0) {
            crumbs += `<span class="breadcrumb-sep">›</span>
              <span class="breadcrumb-crumb" onclick="selectTask('${selectedTaskId}')">${escHtml(sel.task.label)}</span>`;
            rightPath.forEach((rid, i) => {
              const rt = findTask(p.tasks, rid);
              if (!rt) return;
              const isLast = i === rightPath.length - 1;
              const cls = isLast ? 'breadcrumb-current' : 'breadcrumb-crumb';
              const onclick = isLast ? '' : `onclick="navigateRightTo('${rid}',${i})"`;
              crumbs += `<span class="breadcrumb-sep">›</span>
                <span class="${cls}" ${onclick}>${escHtml(rt.task.label)}</span>`;
            });
          } else {
            crumbs += `<span class="breadcrumb-sep">›</span>
              <span class="breadcrumb-current">${escHtml(sel.task.label)}</span>`;
          }
        }
      }

      panel.innerHTML = `
        <div class="detail-split">
          <div class="detail-col detail-col-left">
            <div class="detail-col-header">${escHtml(p.icon)} ${escHtml(p.label)}</div>
            ${p.tasks.map(t => taskRowHtml(t, true)).join('')}
            <button class="btn-add-task" onclick="addTask('${p.id}', null)">+ taak toevoegen</button>
          </div>
          <div class="detail-col detail-col-right">
            <div class="breadcrumb">${crumbs}</div>
            ${rightTasks === null
              ? '<div class="detail-empty">Selecteer een taak om subtaken te zien</div>'
              : rightTasks.length === 0
                ? `<div class="detail-empty">Geen subtaken</div>
                   <button class="btn-add-task" onclick="addSubtask()">+ subtaak toevoegen</button>`
                : rightTasks.map(t => taskRowHtml(t, false)).join('') +
                  `<button class="btn-add-task" onclick="addSubtask()">+ subtaak toevoegen</button>`
            }
          </div>
        </div>`;
      setTimeout(() => { panel.style.maxHeight = panel.scrollHeight + 300 + 'px'; }, 0);
    }

    function taskRowHtml(task, isLeft) {
      const hasChildren = task.children && task.children.length > 0;
      const isAuto = hasChildren;
      const isDone = isAuto ? allLeavesDone(task) : task.done;
      const isSelected = isLeft && task.id === selectedTaskId;
      const clickFn = isLeft ? `selectTask('${task.id}')` : `navigateInto('${task.id}')`;

      return `
        <div class="task-row${isSelected ? ' selected' : ''}" id="task-${task.id}" onclick="${clickFn}">
          <div class="task-check${isDone ? ' done' : ''}${isAuto ? ' auto' : ''}"
               onclick="${isAuto ? 'event.stopPropagation()' : `event.stopPropagation();toggleTask('${task.id}')`}">
            ${isDone ? '✓' : ''}
          </div>
          <div class="task-label${isDone ? ' done' : ''}">${escHtml(task.label)}</div>
          <span class="task-chevron${hasChildren ? ' has-children' : ''}">
            ${hasChildren ? '› ' + task.children.length : '›'}
          </span>
          <div class="task-icons" style="display:${editMode ? 'flex' : 'none'}">
            <button class="task-icon" onclick="event.stopPropagation();startEditTask('${task.id}')" title="Wijzigen">✏</button>
            <button class="task-icon" id="del-${task.id}"
              onclick="event.stopPropagation();confirmDeleteTask('${task.id}')" title="Verwijderen">🗑</button>
          </div>
        </div>`;
    }

    function selectTask(taskId) {
      selectedTaskId = taskId;
      rightPath = [];
      renderDetailPanel();
      expandPanel();
    }

    function navigateInto(taskId) {
      rightPath.push(taskId);
      renderDetailPanel();
      expandPanel();
    }

    function navigateRightTo(taskId, index) {
      rightPath = rightPath.slice(0, index + 1);
      renderDetailPanel();
      expandPanel();
    }

    function resetRightPanel() {
      selectedTaskId = null;
      rightPath = [];
      renderDetailPanel();
      expandPanel();
    }

    // ─── Task CRUD ────────────────────────────────────────────────────────────────
    const _deleteConfirm = new Set();

    function toggleTask(taskId) {
      const p = getPillar(state.activePillar);
      if (!p) return;
      const found = findTask(p.tasks, taskId);
      if (!found || found.task.children.length > 0) return; // auto-computed parents are read-only
      found.task.done = !found.task.done;
      saveData();
      renderCanvas();
      renderDetailPanel();
      expandPanel();
    }

    function addTask(pillarId, parentTaskId) {
      const p = getPillar(pillarId);
      const newTask = { id: generateId(), label: '', done: false, phase: 1, children: [] };
      if (parentTaskId) {
        const found = findTask(p.tasks, parentTaskId);
        if (found) found.task.children.push(newTask);
        else p.tasks.push(newTask);
      } else {
        p.tasks.push(newTask);
      }
      saveData();
      renderDetailPanel();
      expandPanel();
      setTimeout(() => startEditTask(newTask.id, true), 30);
    }

    function addSubtask() {
      const p = getPillar(state.activePillar);
      if (!p) return;
      const parentId = rightPath.length > 0 ? rightPath[rightPath.length - 1] : selectedTaskId;
      if (!parentId) return;
      addTask(p.id, parentId);
    }

    function startEditTask(taskId, isNew = false) {
      const p = getPillar(state.activePillar);
      if (!p) return;
      const found = findTask(p.tasks, taskId);
      if (!found) return;
      const task = found.task;
      const el = document.getElementById(`task-${taskId}`);
      if (!el) return;
      const labelEl = el.querySelector('.task-label');
      if (!labelEl) return;

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'task-label-input';
      input.value = task.label;
      input.placeholder = 'Taaknaam...';
      labelEl.replaceWith(input);
      input.focus();
      if (task.label) input.select();

      let saved = false;
      const save = () => {
        if (saved) return;
        saved = true;
        const v = input.value.trim();
        if (!v && isNew) { deleteTask(taskId, true); return; }
        task.label = v || task.label;
        saveData();
        renderCanvas();
        renderDetailPanel();
        expandPanel();
      };
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); save(); }
        if (e.key === 'Escape') {
          saved = true;
          if (isNew) deleteTask(taskId, true);
          else { renderDetailPanel(); expandPanel(); }
        }
      });
      input.addEventListener('blur', save);
    }

    function confirmDeleteTask(taskId) {
      const btn = document.getElementById(`del-${taskId}`);
      if (!btn) return;
      if (_deleteConfirm.has(taskId)) {
        deleteTask(taskId);
        _deleteConfirm.delete(taskId);
      } else {
        _deleteConfirm.add(taskId);
        btn.classList.add('delete-confirm');
        setTimeout(() => {
          _deleteConfirm.delete(taskId);
          const b = document.getElementById(`del-${taskId}`);
          if (b) b.classList.remove('delete-confirm');
        }, 2500);
      }
    }

    function deleteTask(taskId, silent = false) {
      const p = getPillar(state.activePillar);
      if (!p) return;
      removeTaskById(p.tasks, taskId);
      if (selectedTaskId === taskId) { selectedTaskId = null; rightPath = []; }
      rightPath = rightPath.filter(id => id !== taskId);
      saveData();
      if (!silent) { renderCanvas(); renderDetailPanel(); expandPanel(); }
    }

    // ─── Roadmap ──────────────────────────────────────────────────────────────────
    let _draggedBadge = null; // { taskId, pillarId }

    function renderRoadmap() {
      // Clear any pending phase-delete confirms so re-renders don't leave stale confirm state
      _phaseDeleteConfirm.forEach(id => clearTimeout(_phaseDeleteTimers.get(id)));
      _phaseDeleteConfirm.clear();
      _phaseDeleteTimers.clear();
      renderRoadmapLegend();
      const container = document.getElementById('roadmap-container');
      if (!container) return;

      const sortedPhases = [...state.phases].sort((a, b) => a.order - b.order);
      container.innerHTML = sortedPhases.map((phase, idx) => {
        const isLast = idx === sortedPhases.length - 1;
        const phaseTasks = state.pillars.flatMap(p =>
          flattenTasks(p.tasks)
            .filter(t => t.phase === phase.id)
            .map(t => ({ ...t, pillarId: p.id, pillarColor: p.color, pillarIcon: p.icon }))
        );
        const hasTasks = phaseTasks.length > 0;

        return `
      <div class="phase-item">
        <div class="phase-marker">
          <div class="phase-dot${!hasTasks ? ' future' : ''}">${phase.order + 1}</div>
          ${!isLast ? '<div class="phase-connector"></div>' : ''}
        </div>
        <div class="phase-content">
          <div class="phase-name-row">
            <div class="phase-name-label${!hasTasks ? ' future' : ''}">${escHtml(phase.label)}</div>
            <div class="phase-edit-controls" style="display:${editMode ? 'flex' : 'none'}">
              <button class="phase-edit-btn" onclick="startEditPhase(${phase.id})">✏</button>
              <button class="phase-edit-btn" id="phase-del-${phase.id}"
                onclick="confirmDeletePhase(${phase.id})">🗑</button>
            </div>
          </div>
          <div class="phase-drop-zone" id="drop-zone-${phase.id}" data-phase-id="${phase.id}">
            ${phaseTasks.length === 0
              ? '<span class="tag-empty">Geen taken</span>'
              : phaseTasks.map(t => `
                  <span class="phase-tag${allLeavesDone(t) ? ' tag-done' : ''}"
                        style="background:${hexAlpha(t.pillarColor, 0.18)};color:${escHtml(t.pillarColor)};border-color:${hexAlpha(t.pillarColor, 0.3)}"
                        draggable="${allLeavesDone(t) ? 'false' : 'true'}"
                        data-task-id="${t.id}" data-pillar-id="${t.pillarId}">
                    ${escHtml(t.pillarIcon)} ${escHtml(t.label)}
                  </span>`).join('')
            }
          </div>
        </div>
      </div>`;
      }).join('');

      // Add phase button
      let addBtn = document.getElementById('add-phase-btn');
      if (!addBtn) {
        addBtn = document.createElement('button');
        addBtn.id = 'add-phase-btn';
        addBtn.className = 'btn-add-phase';
        addBtn.textContent = '+ fase toevoegen';
        addBtn.onclick = addPhase;
      }
      addBtn.style.display = editMode ? 'block' : 'none';
      container.appendChild(addBtn);

      attachBadgeDragHandlers();
    }

    function attachBadgeDragHandlers() {
      document.querySelectorAll('.phase-tag:not(.tag-done)').forEach(tag => {
        tag.addEventListener('dragstart', e => {
          _draggedBadge = { taskId: tag.dataset.taskId, pillarId: tag.dataset.pillarId };
          tag.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        tag.addEventListener('dragend', () => {
          tag.classList.remove('dragging');
          _draggedBadge = null;
        });
      });

      document.querySelectorAll('.phase-drop-zone').forEach(zone => {
        zone.addEventListener('dragover', e => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          zone.classList.add('drag-over');
        });
        zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
        zone.addEventListener('drop', e => {
          e.preventDefault();
          zone.classList.remove('drag-over');
          if (!_draggedBadge) return;
          const newPhaseId = parseInt(zone.dataset.phaseId);
          const p = getPillar(_draggedBadge.pillarId);
          if (!p) return;
          const found = findTask(p.tasks, _draggedBadge.taskId);
          if (found) { found.task.phase = newPhaseId; saveData(); renderRoadmap(); }
        });
      });
    }

    // ─── Phase CRUD ───────────────────────────────────────────────────────────────
    const _phaseDeleteConfirm = new Set();
    const _phaseDeleteTimers = new Map();

    function addPhase() {
      const maxOrder = state.phases.reduce((m, p) => Math.max(m, p.order), -1);
      const newId = Math.max(0, ...state.phases.map(p => p.id)) + 1;
      state.phases.push({ id: newId, label: `Fase ${newId}`, order: maxOrder + 1 });
      saveData();
      renderRoadmap();
      setTimeout(() => startEditPhase(newId), 50);
    }

    function startEditPhase(phaseId) {
      const phase = state.phases.find(p => p.id === phaseId);
      if (!phase) return;
      const nameEl = document.querySelector(`#drop-zone-${phaseId}`)
        ?.closest('.phase-content')?.querySelector('.phase-name-label');
      if (!nameEl) return;

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'task-label-input';
      input.value = phase.label;
      input.style.fontSize = '14px';
      nameEl.replaceWith(input);
      input.focus(); input.select();

      let saved = false;
      const save = () => {
        if (saved) return;
        saved = true;
        const v = input.value.trim();
        if (v) phase.label = v;
        saveData();
        renderRoadmap();
      };
      input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); save(); } });
      input.addEventListener('blur', save);
    }

    function confirmDeletePhase(phaseId) {
      const btn = document.getElementById(`phase-del-${phaseId}`);
      if (!btn) return;
      if (_phaseDeleteConfirm.has(phaseId)) {
        clearTimeout(_phaseDeleteTimers.get(phaseId));
        _phaseDeleteTimers.delete(phaseId);
        state.pillars.forEach(p =>
          flattenTasks(p.tasks).forEach(t => { if (t.phase === phaseId) t.phase = null; })
        );
        state.phases = state.phases.filter(p => p.id !== phaseId);
        state.phases.sort((a, b) => a.order - b.order).forEach((p, i) => p.order = i);
        _phaseDeleteConfirm.delete(phaseId);
        saveData();
        renderRoadmap();
      } else {
        _phaseDeleteConfirm.add(phaseId);
        btn.classList.add('delete-confirm');
        const timer = setTimeout(() => {
          _phaseDeleteConfirm.delete(phaseId);
          _phaseDeleteTimers.delete(phaseId);
          const b = document.getElementById(`phase-del-${phaseId}`);
          if (b) b.classList.remove('delete-confirm');
        }, 2500);
        _phaseDeleteTimers.set(phaseId, timer);
      }
    }

    // ─── View Toggle ─────────────────────────────────────────────────────────
    function switchView(view) {
      currentView = view;
      const dash = document.getElementById('dashboard-view');
      const road = document.getElementById('roadmap-view');
      const mind = document.getElementById('mindmap-view');
      const btns = document.querySelectorAll('.toggle-btn');
      dash.style.display = 'none';
      road.style.display = 'none';
      mind.style.display = 'none';
      btns.forEach(b => b.classList.remove('active'));

      if (view === 'dashboard') {
        dash.style.display = 'block';
        btns[0].classList.add('active');
      } else if (view === 'roadmap') {
        road.style.display = 'block';
        btns[1].classList.add('active');
        renderRoadmap();
      } else if (view === 'mindmap') {
        mind.style.display = 'flex';
        btns[2].classList.add('active');
        mmData = loadMindmapData();
        renderMindmap();
      }
    }

    // ─── Reset ───────────────────────────────────────────────────────────────
    function resetData() {
      if (!confirm('Alle voortgang wissen en terug naar de standaard taken? Dit kan niet ongedaan worden gemaakt.')) return;
      localStorage.removeItem(STORAGE_KEY_V2);
      localStorage.removeItem(STORAGE_KEY_V1);
      localStorage.removeItem(STORAGE_KEY_MM);
      state = deepClone(DEFAULT_DATA);
      editMode = false;
      document.getElementById('edit-toggle-btn').style.display = '';
      document.getElementById('edit-done-btn').style.display = 'none';
      document.getElementById('add-pillar-node').style.display = 'none';
      init();
    }

    // ─── Init ────────────────────────────────────────────────────────────────
    function init() {
      state = loadData();
      switchView('dashboard');
      renderCanvas();
      if (state.activePillar) {
        selectedTaskId = null;
        rightPath = [];
        renderDetailPanel();
        expandPanel();
      }
    }

    // ─── Service Worker ──────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .catch(err => console.warn('SW registration failed:', err));
      });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
