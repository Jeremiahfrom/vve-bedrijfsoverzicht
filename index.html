<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VvE Beheer Collectief — Bedrijfsoverzicht</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1f2d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VvE Dashboard">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0d1f2d;
      --gold: #c8a96e;
      --cream: #f5f0e8;
      --gold-15: rgba(200,169,110,0.15);
      --gold-25: rgba(200,169,110,0.25);
      --gold-40: rgba(200,169,110,0.40);
      --cream-85: rgba(245,240,232,0.85);
      --cream-50: rgba(245,240,232,0.50);
      --cream-30: rgba(245,240,232,0.30);
      --radius: 12px;
      --radius-sm: 7px;
    }

    body {
      background: var(--navy);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    #app { max-width: 860px; margin: 0 auto; padding: 28px 20px 60px; }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .app-title {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: -0.01em;
      color: var(--cream);
    }

    .app-title em { color: var(--gold); font-style: italic; }

    .view-toggle {
      display: flex;
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }

    .toggle-btn {
      padding: 6px 16px;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--cream-50);
      cursor: pointer;
      background: none;
      border: none;
      letter-spacing: 0.03em;
      transition: color 0.15s, background 0.15s;
    }

    .toggle-btn.active { background: var(--gold-15); color: var(--gold); }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .edit-btn {
      padding: 6px 14px;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--gold);
      background: var(--gold-15);
      border: 1px solid var(--gold-40);
      cursor: pointer;
      transition: background 0.15s;
    }
    .edit-btn:hover { background: var(--gold-25); }

    .edit-done-btn {
      padding: 6px 14px;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: #5dd9a0;
      background: rgba(93,217,160,0.12);
      border: 1px solid rgba(93,217,160,0.35);
      cursor: pointer;
      transition: background 0.15s;
    }
    .edit-done-btn:hover { background: rgba(93,217,160,0.2); }

    /* ── Canvas ─────────────────────────────────────────────────────────────── */
    #canvas-container {
      position: relative;
      width: 100%;
      min-height: 220px;
      margin-bottom: 16px;
      background-image: radial-gradient(circle, rgba(200,169,110,0.12) 1px, transparent 1px);
      background-size: 24px 24px;
      border-radius: var(--radius);
      border: 1px solid rgba(200,169,110,0.1);
    }
    #canvas-nodes {
      position: relative;
      width: 100%;
      min-height: 220px;
    }
    .pillar-node {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      user-select: none;
      padding: 12px;
      border-radius: 14px;
      border: 1.5px solid transparent;
      width: 100px;
      transition: border-color 0.2s, background 0.15s;
    }
    .pillar-node:hover { border-color: rgba(200,169,110,0.35); background: rgba(200,169,110,0.04); }
    .pillar-node.active { border-color: var(--gold); background: rgba(200,169,110,0.08); }
    .pillar-node.dragging { opacity: 0.5; cursor: grabbing; }
    .node-ring-wrap { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
    .node-ring-wrap svg { width: 64px; height: 64px; transform: rotate(-90deg); }
    .node-ring-pct {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
    }
    .node-icon {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; pointer-events: none;
    }
    .node-name {
      font-family: 'Fraunces', serif;
      font-size: 13px; font-weight: 400;
      text-align: center; color: var(--cream);
      line-height: 1.2; max-width: 90px; word-break: break-word;
    }
    .node-count { font-size: 10px; color: var(--cream-50); text-align: center; }
    .node-edit-controls { display: none; gap: 4px; margin-top: 4px; }
    .node-edit-btn {
      width: 24px; height: 24px; border-radius: 5px;
      background: rgba(200,169,110,0.1); border: 1px solid rgba(200,169,110,0.2);
      color: rgba(200,169,110,0.7); font-size: 11px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .node-edit-btn:hover { background: var(--gold-25); color: var(--gold); }
    .node-edit-btn.delete-confirm { background: rgba(220,60,60,0.18); color: #e07070; border-color: rgba(220,60,60,0.3); }
    .add-pillar-node {
      position: absolute; width: 80px; padding: 12px 8px;
      border-radius: 14px; border: 1.5px dashed rgba(200,169,110,0.3);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; cursor: pointer; opacity: 0.7; top: 60px;
      transition: opacity 0.15s, border-color 0.15s;
    }
    .add-pillar-node:hover { opacity: 1; border-color: var(--gold); }
    .add-pillar-icon { font-size: 22px; color: var(--gold); line-height: 1; }
    .add-pillar-label { font-size: 10px; color: rgba(200,169,110,0.7); }

    /* ── Detail Panel ───────────────────────────────────────────────────────── */
    #detail-panel {
      background: rgba(200,169,110,0.05);
      border: 1px solid rgba(200,169,110,0.2);
      border-radius: var(--radius);
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.25s;
    }
    #detail-panel.open { opacity: 1; }
    .detail-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 200px;
    }
    .detail-col { padding: 16px; display: flex; flex-direction: column; gap: 4px; }
    .detail-col-left { border-right: 1px solid rgba(200,169,110,0.12); }
    .detail-col-header {
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(200,169,110,0.6); margin-bottom: 8px;
    }
    .breadcrumb {
      display: flex; align-items: center; gap: 4px;
      font-size: 10px; flex-wrap: wrap; margin-bottom: 8px; min-height: 16px;
    }
    .breadcrumb-crumb { color: var(--gold); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }
    .breadcrumb-sep { color: rgba(245,240,232,0.3); }
    .breadcrumb-current { color: rgba(245,240,232,0.7); }
    .task-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 9px;
      background: rgba(255,255,255,0.03);
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }
    .task-row:hover { background: rgba(255,255,255,0.06); }
    .task-row.selected { background: rgba(200,169,110,0.1); border-color: rgba(200,169,110,0.35); }
    .task-check {
      width: 16px; height: 16px;
      border: 1.5px solid rgba(200,169,110,0.4); border-radius: 3px;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 10px; transition: background 0.15s, border-color 0.15s;
    }
    .task-check.done { background: var(--gold); border-color: var(--gold); color: var(--navy); }
    .task-check.done::after { content: '✓'; font-weight: 900; }
    .task-check.auto { opacity: 0.6; cursor: default; }
    .task-label { flex: 1; font-size: 12px; color: var(--cream-85); line-height: 1.35; }
    .task-label.done { text-decoration: line-through; color: var(--cream-30); }
    .task-label-input {
      flex: 1; background: rgba(255,255,255,0.08);
      border: 1px solid var(--gold-40); border-radius: 4px;
      padding: 2px 7px; font-family: 'DM Sans', sans-serif;
      font-size: 12px; color: var(--cream); outline: none;
    }
    .task-label-input:focus { border-color: var(--gold); }
    .task-chevron { font-size: 10px; color: rgba(245,240,232,0.3); flex-shrink: 0; }
    .task-chevron.has-children { color: var(--gold); }
    .task-icons {
      display: flex; gap: 3px; flex-shrink: 0;
      opacity: 0; transition: opacity 0.15s;
    }
    .task-row:hover .task-icons,
    .task-row:focus-within .task-icons { opacity: 1; }
    .task-icon {
      width: 22px; height: 22px; border-radius: 4px;
      background: rgba(200,169,110,0.07); border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; cursor: pointer; color: rgba(200,169,110,0.55);
      transition: background 0.15s, color 0.15s;
    }
    .task-icon:hover { background: var(--gold-15); color: var(--gold); }
    .task-icon.delete-confirm { background: rgba(220,60,60,0.18); color: #e07070; }
    .btn-add-task {
      margin-top: 4px; padding: 6px 10px;
      border-radius: var(--radius-sm); border: 1px dashed rgba(200,169,110,0.3);
      background: none; font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 500; color: rgba(200,169,110,0.6);
      cursor: pointer; text-align: left;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-add-task:hover { border-color: var(--gold); color: var(--gold); }
    .detail-empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: rgba(245,240,232,0.2); text-align: center; padding: 24px;
    }

    /* ROADMAP VIEW */
    #roadmap-view { display: none; }

    .roadmap-legend {
      font-size: 12px;
      color: var(--cream-50);
      margin-bottom: 22px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .legend-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    .phase-item { display: flex; gap: 16px; }

    .phase-marker {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      width: 40px;
    }

    .phase-dot {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 2px solid var(--gold-40);
      background: rgba(200,169,110,0.1);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fraunces', serif;
      font-size: 16px;
      font-weight: 400;
      color: var(--gold);
      flex-shrink: 0;
    }

    .phase-dot.future { border-color: rgba(200,169,110,0.2); background: transparent; color: rgba(200,169,110,0.3); }

    .phase-connector {
      width: 2px;
      flex: 1;
      min-height: 16px;
      background: rgba(200,169,110,0.12);
      margin-top: 4px;
    }

    .phase-content { flex: 1; padding-bottom: 26px; padding-top: 8px; }

    .phase-name-label {
      font-family: 'Fraunces', serif;
      font-size: 16px;
      font-weight: 400;
      color: var(--cream);
      margin-bottom: 10px;
    }

    .phase-name-label.future { color: var(--cream-50); }

    .phase-tags { display: flex; flex-wrap: wrap; gap: 6px; }

    .phase-tag {
      padding: 4px 10px;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 500;
    }

    .tag-brand { background: rgba(200,169,110,0.15); color: var(--gold); border: 1px solid rgba(200,169,110,0.3); }
    .tag-website { background: rgba(100,160,210,0.12); color: #7ab8d4; border: 1px solid rgba(100,160,210,0.25); }
    .tag-automation { background: rgba(120,195,140,0.1); color: #7dc892; border: 1px solid rgba(120,195,140,0.22); }
    .tag-done { background: rgba(255,255,255,0.04); color: var(--cream-30); border: 1px solid rgba(255,255,255,0.08); text-decoration: line-through; }
    .tag-empty { font-size: 12px; color: var(--cream-30); font-style: italic; }

    /* RESET */
    .reset-section {
      margin-top: 44px;
      padding-top: 20px;
      border-top: 1px solid rgba(200,169,110,0.1);
      text-align: center;
    }

    .btn-reset {
      background: none;
      border: 1px solid rgba(200,169,110,0.18);
      border-radius: 6px;
      padding: 7px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--cream-50);
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-reset:hover { border-color: rgba(200,60,60,0.45); color: #e07070; }

    /* RESPONSIVE */
    @media (max-width: 620px) {
      header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1 class="app-title">VvE Beheer <em>Collectief</em></h1>
      <div class="header-controls">
        <div class="view-toggle">
          <button class="toggle-btn active" onclick="switchView('dashboard')">Dashboard</button>
          <button class="toggle-btn" onclick="switchView('roadmap')">Roadmap</button>
        </div>
        <button class="edit-btn" id="edit-toggle-btn" onclick="toggleEditMode()">✏ Bewerken</button>
        <button class="edit-done-btn" id="edit-done-btn" onclick="toggleEditMode()" style="display:none">✓ Klaar</button>
      </div>
    </header>

    <div id="dashboard-view">
      <div id="canvas-container">
        <div id="canvas-nodes"></div>
        <div id="add-pillar-node" class="add-pillar-node" onclick="if(typeof addPillar==='function') addPillar()" style="display:none">
          <div class="add-pillar-icon">+</div>
          <div class="add-pillar-label">pilaar</div>
        </div>
      </div>
      <div id="detail-panel"></div>
    </div>

    <div id="roadmap-view" style="display:none">
      <div id="roadmap-legend"></div>
      <div id="roadmap-container"></div>
    </div>

    <div class="reset-section">
      <button class="btn-reset" onclick="resetData()">Voortgang resetten</button>
    </div>
  </div>

  <script>
    // ─── Constants ────────────────────────────────────────────────────────────────
    const STORAGE_KEY_V2 = 'vve-dashboard-v2';
    const STORAGE_KEY_V1 = 'vve-dashboard-v1';
    const PRESET_COLORS = ['#c8a96e','#6aabf7','#5dd9a0','#e07070','#c47ed4','#f0c060'];

    const DEFAULT_DATA = {
      activePillar: null,
      pillars: [
        {
          id: 'brand', icon: '🎨', label: 'Brand Refinement', color: '#c8a96e',
          position: { x: 60, y: 60 },
          tasks: [
            { id: 'b1', label: 'Logo finaliseren / updaten', done: false, phase: 1, children: [] },
            { id: 'b2', label: 'Brand kleurenpalet & typografie vastleggen', done: false, phase: 1, children: [] },
            { id: 'b3', label: 'Brand guidelines document opstellen', done: false, phase: 1, children: [] },
            { id: 'b4', label: 'Social media templates maken', done: false, phase: 2, children: [] },
            { id: 'b5', label: 'Visitekaartjes & drukwerk updaten', done: false, phase: 2, children: [] }
          ]
        },
        {
          id: 'website', icon: '🌐', label: 'Nieuwe Website', color: '#6aabf7',
          position: { x: 280, y: 60 },
          tasks: [
            { id: 'w1', label: 'Homepage', done: true, phase: 1, children: [] },
            { id: 'w2', label: 'Over ons pagina', done: false, phase: 1, children: [] },
            { id: 'w3', label: 'Pakketten pagina', done: false, phase: 2, children: [] },
            { id: 'w4', label: 'Contact pagina', done: false, phase: 2, children: [] },
            { id: 'w5', label: 'Schademelding formulier', done: false, phase: 2, children: [] },
            {
              id: 'w6', label: "Diensten subpagina's", done: false, phase: 2,
              children: [
                { id: 'w6-1', label: 'Loodgieterij', done: false, phase: null, children: [] },
                { id: 'w6-2', label: 'Electra', done: false, phase: null, children: [] },
                { id: 'w6-3', label: 'Dakdekkers', done: false, phase: null, children: [] },
                { id: 'w6-4', label: 'Schilderwerk', done: false, phase: null, children: [] }
              ]
            },
            { id: 'w7', label: 'SEO & meta tags', done: false, phase: 3, children: [] },
            { id: 'w8', label: 'Live zetten (DNS / hosting)', done: false, phase: 4, children: [] }
          ]
        },
        {
          id: 'automation', icon: '⚡', label: 'Automation', color: '#5dd9a0',
          position: { x: 500, y: 60 },
          tasks: [
            { id: 'a1', label: 'Schademeldingen workflow (n8n)', done: false, phase: 3, children: [] },
            { id: 'a2', label: 'Klantonboarding workflow', done: false, phase: 3, children: [] },
            { id: 'a3', label: 'Factuur- & debiteurenproces', done: false, phase: 3, children: [] },
            { id: 'a4', label: 'E-mail templates & reminders', done: false, phase: 3, children: [] },
            { id: 'a5', label: 'Vergadering & notulen workflow', done: false, phase: 4, children: [] },
            { id: 'a6', label: 'Maandrapportage automatiseren', done: false, phase: 4, children: [] }
          ]
        }
      ],
      phases: [
        { id: 1, label: 'Fase 1 — Fundament', order: 0 },
        { id: 2, label: 'Fase 2 — Uitbouwen', order: 1 },
        { id: 3, label: 'Fase 3 — Automation', order: 2 },
        { id: 4, label: 'Fase 4 — Lanceren & Schalen', order: 3 }
      ]
    };

    // ─── State ────────────────────────────────────────────────────────────────────
    let state;

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY_V2);
        if (raw) return JSON.parse(raw);
        const v1raw = localStorage.getItem(STORAGE_KEY_V1);
        if (v1raw) return migrateV1(JSON.parse(v1raw));
        return deepClone(DEFAULT_DATA);
      } catch { return deepClone(DEFAULT_DATA); }
    }

    function saveData() { localStorage.setItem(STORAGE_KEY_V2, JSON.stringify(state)); }
    function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }
    function getPillar(id) { return state.pillars.find(p => p.id === id); }

    // ─── Utils ────────────────────────────────────────────────────────────────────
    function generateId() { return Math.random().toString(36).slice(2, 9); }

    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = String(str);
      return d.innerHTML;
    }

    // Recursively count leaf tasks and how many are done
    function countLeaves(tasks) {
      let total = 0, done = 0;
      for (const t of tasks) {
        if (!t.children || t.children.length === 0) {
          total++; if (t.done) done++;
        } else {
          const sub = countLeaves(t.children);
          total += sub.total; done += sub.done;
        }
      }
      return { total, done };
    }

    function calcProgress(pillar) {
      const { total, done } = countLeaves(pillar.tasks);
      return total === 0 ? 0 : Math.round(done / total * 100);
    }

    // Returns true when all leaf descendants of a task are done
    function allLeavesDone(task) {
      if (!task.children || task.children.length === 0) return task.done;
      return task.children.every(c => allLeavesDone(c));
    }

    // Find a task by id anywhere in the tree; returns { task, parent }
    function findTask(tasks, id) {
      for (const t of tasks) {
        if (t.id === id) return { task: t, parent: tasks };
        if (t.children && t.children.length > 0) {
          const found = findTask(t.children, id);
          if (found) return found;
        }
      }
      return null;
    }

    // Flatten all tasks in a tree to a single array
    function flattenTasks(tasks) {
      return tasks.flatMap(t => [t, ...flattenTasks(t.children || [])]);
    }

    // Remove a task by id from anywhere in a task tree; returns true if removed
    function removeTaskById(tasks, id) {
      const idx = tasks.findIndex(t => t.id === id);
      if (idx !== -1) { tasks.splice(idx, 1); return true; }
      for (const t of tasks) {
        if (t.children && removeTaskById(t.children, id)) return true;
      }
      return false;
    }

    // Convert hex color to rgba string
    function hexAlpha(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function migrateV1(v1) {
      const data = deepClone(DEFAULT_DATA);
      for (const v1p of (v1.pillars || [])) {
        const p = data.pillars.find(p2 => p2.id === v1p.id);
        if (!p) continue;
        for (const v1t of (v1p.tasks || [])) {
          const t = p.tasks.find(t2 => t2.id === v1t.id);
          if (t) { t.done = v1t.done; t.phase = v1t.phase; }
        }
      }
      data.activePillar = v1.activePillar || null;
      return data;
    }

    // ─── Edit Mode ────────────────────────────────────────────────────────────────
    let editMode = false;

    function toggleEditMode() {
      editMode = !editMode;
      document.getElementById('edit-toggle-btn').style.display = editMode ? 'none' : '';
      document.getElementById('edit-done-btn').style.display = editMode ? '' : 'none';
      document.getElementById('add-pillar-node').style.display = editMode ? 'flex' : 'none';
      if (typeof renderCanvas === 'function') renderCanvas();
      if (state.activePillar && typeof renderDetailPanel === 'function') renderDetailPanel();
      if (typeof renderRoadmap === 'function') renderRoadmap();
    }

    // ─── Canvas ───────────────────────────────────────────────────────────────────
    const R_NODE = 26;
    const CIRC_NODE = +(2 * Math.PI * R_NODE).toFixed(1);

    function renderCanvas() {
      const container = document.getElementById('canvas-nodes');
      container.innerHTML = state.pillars.map(p => {
        const pct = calcProgress(p);
        const { total, done } = countLeaves(p.tasks);
        const offset = +(CIRC_NODE - CIRC_NODE * pct / 100).toFixed(1);
        const active = state.activePillar === p.id;
        const x = (p.position && p.position.x != null) ? p.position.x : 60;
        const y = (p.position && p.position.y != null) ? p.position.y : 60;
        return `
      <div class="pillar-node${active ? ' active' : ''}" id="node-${p.id}"
           style="left:${x}px;top:${y}px;" data-pillar-id="${p.id}">
        <div class="node-ring-wrap">
          <svg viewBox="0 0 64 64">
            <circle fill="none" stroke="rgba(200,169,110,0.15)" stroke-width="4" cx="32" cy="32" r="${R_NODE}"/>
            <circle fill="none" stroke="${escHtml(p.color)}" stroke-width="4" stroke-linecap="round"
              cx="32" cy="32" r="${R_NODE}"
              stroke-dasharray="${CIRC_NODE}" stroke-dashoffset="${offset}"
              style="transition:stroke-dashoffset 0.5s cubic-bezier(0.34,1.56,0.64,1)"/>
          </svg>
          <div class="node-icon">${escHtml(p.icon)}</div>
          <div class="node-ring-pct" style="color:${escHtml(p.color)}">${pct}%</div>
        </div>
        <div class="node-name">${escHtml(p.label)}</div>
        <div class="node-count">${done}/${total}</div>
        <div class="node-edit-controls" style="display:${editMode ? 'flex' : 'none'}">
          <button class="node-edit-btn" onclick="editPillar(event,'${p.id}')" title="Bewerken">✏</button>
          <button class="node-edit-btn" id="node-del-${p.id}"
            onclick="confirmDeletePillar(event,'${p.id}')" title="Verwijderen">🗑</button>
        </div>
      </div>`;
      }).join('');

      // Position add-pillar node after last pillar
      const addNode = document.getElementById('add-pillar-node');
      const lastPillar = state.pillars[state.pillars.length - 1];
      if (lastPillar && lastPillar.position) {
        addNode.style.left = (lastPillar.position.x + 120) + 'px';
        addNode.style.top = lastPillar.position.y + 'px';
      }

      attachNodeClickHandlers();
    }

    function attachNodeClickHandlers() {
      document.querySelectorAll('.pillar-node').forEach(el => {
        const pillarId = el.dataset.pillarId;
        let dragMoved = false;
        el.addEventListener('mousedown', e => {
          if (e.target.closest('.node-edit-controls')) return;
          dragMoved = false;
          initNodeDrag(e, el, pillarId, () => { dragMoved = true; });
        });
        el.addEventListener('click', e => {
          if (e.target.closest('.node-edit-controls')) return;
          if (!dragMoved) activatePillar(pillarId);
        });
      });
    }

    function initNodeDrag(e, el, pillarId, onMoved) {
      e.preventDefault();
      const startX = e.clientX;
      const startY = e.clientY;
      const pillar = getPillar(pillarId);
      const origX = (pillar.position && pillar.position.x != null) ? pillar.position.x : 0;
      const origY = (pillar.position && pillar.position.y != null) ? pillar.position.y : 0;
      let moved = false;

      function onMouseMove(ev) {
        const dx = ev.clientX - startX;
        const dy = ev.clientY - startY;
        if (!moved && Math.abs(dx) + Math.abs(dy) > 5) {
          moved = true;
          onMoved();
          el.classList.add('dragging');
        }
        if (!moved) return;
        el.style.left = Math.max(0, origX + dx) + 'px';
        el.style.top = Math.max(0, origY + dy) + 'px';
      }

      function onMouseUp(ev) {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        el.classList.remove('dragging');
        if (moved) {
          pillar.position = {
            x: Math.max(0, origX + (ev.clientX - startX)),
            y: Math.max(0, origY + (ev.clientY - startY))
          };
          saveData();
          // Reposition add-pillar node
          const addNode = document.getElementById('add-pillar-node');
          const lastPillar = state.pillars[state.pillars.length - 1];
          if (lastPillar && lastPillar.position) {
            addNode.style.left = (lastPillar.position.x + 120) + 'px';
            addNode.style.top = lastPillar.position.y + 'px';
          }
        }
      }

      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    }

    // Stubs — full implementation added in Task 7 (Pillar CRUD)
    function editPillar(e, pillarId) { e.stopPropagation(); }
    function confirmDeletePillar(e, pillarId) { e.stopPropagation(); }
    function addPillar() {}
    function renderRoadmapLegend() {}

    // ─── Detail Panel ─────────────────────────────────────────────────────────────
    function activatePillar(id) {
      if (state.activePillar === id) {
        state.activePillar = null;
        selectedTaskId = null;
        rightPath = [];
        collapsePanel();
      } else {
        state.activePillar = id;
        selectedTaskId = null;
        rightPath = [];
        renderCanvas();
        renderDetailPanel();
        expandPanel();
      }
      saveData();
    }

    function expandPanel() {
      const panel = document.getElementById('detail-panel');
      panel.classList.add('open');
      setTimeout(() => { panel.style.maxHeight = panel.scrollHeight + 300 + 'px'; }, 0);
    }

    function collapsePanel() {
      const panel = document.getElementById('detail-panel');
      panel.classList.remove('open');
      panel.style.maxHeight = '0';
      if (typeof renderCanvas === 'function') renderCanvas();
    }

    function renderDetailPanel() {
      if (!state.activePillar) return;
      const p = getPillar(state.activePillar);
      if (!p) return;
      const panel = document.getElementById('detail-panel');

      // Determine what the right column shows
      let rightTasks = null;
      if (rightPath.length > 0) {
        const deepTask = findTask(p.tasks, rightPath[rightPath.length - 1]);
        if (deepTask) rightTasks = deepTask.task.children;
      } else if (selectedTaskId) {
        const sel = findTask(p.tasks, selectedTaskId);
        if (sel) rightTasks = sel.task.children;
      }

      // Build breadcrumb HTML
      let crumbs = `<span class="breadcrumb-crumb" onclick="resetRightPanel()">${escHtml(p.icon)} ${escHtml(p.label)}</span>`;
      if (selectedTaskId) {
        const sel = findTask(p.tasks, selectedTaskId);
        if (sel) {
          if (rightPath.length > 0) {
            crumbs += `<span class="breadcrumb-sep">›</span>
              <span class="breadcrumb-crumb" onclick="selectTask('${selectedTaskId}')">${escHtml(sel.task.label)}</span>`;
            rightPath.forEach((rid, i) => {
              const rt = findTask(p.tasks, rid);
              if (!rt) return;
              const isLast = i === rightPath.length - 1;
              const cls = isLast ? 'breadcrumb-current' : 'breadcrumb-crumb';
              const onclick = isLast ? '' : `onclick="navigateRightTo('${rid}',${i})"`;
              crumbs += `<span class="breadcrumb-sep">›</span>
                <span class="${cls}" ${onclick}>${escHtml(rt.task.label)}</span>`;
            });
          } else {
            crumbs += `<span class="breadcrumb-sep">›</span>
              <span class="breadcrumb-current">${escHtml(sel.task.label)}</span>`;
          }
        }
      }

      panel.innerHTML = `
        <div class="detail-split">
          <div class="detail-col detail-col-left">
            <div class="detail-col-header">${escHtml(p.icon)} ${escHtml(p.label)}</div>
            ${p.tasks.map(t => taskRowHtml(t, true)).join('')}
            <button class="btn-add-task" onclick="addTask('${p.id}', null)">+ taak toevoegen</button>
          </div>
          <div class="detail-col detail-col-right">
            <div class="breadcrumb">${crumbs}</div>
            ${rightTasks === null
              ? '<div class="detail-empty">Selecteer een taak om subtaken te zien</div>'
              : rightTasks.length === 0
                ? `<div class="detail-empty">Geen subtaken</div>
                   <button class="btn-add-task" onclick="addSubtask()">+ subtaak toevoegen</button>`
                : rightTasks.map(t => taskRowHtml(t, false)).join('') +
                  `<button class="btn-add-task" onclick="addSubtask()">+ subtaak toevoegen</button>`
            }
          </div>
        </div>`;
      setTimeout(() => { panel.style.maxHeight = panel.scrollHeight + 300 + 'px'; }, 0);
    }

    function taskRowHtml(task, isLeft) {
      const hasChildren = task.children && task.children.length > 0;
      const isAuto = hasChildren;
      const isDone = isAuto ? allLeavesDone(task) : task.done;
      const isSelected = isLeft && task.id === selectedTaskId;
      const clickFn = isLeft ? `selectTask('${task.id}')` : `navigateInto('${task.id}')`;

      return `
        <div class="task-row${isSelected ? ' selected' : ''}" id="task-${task.id}" onclick="${clickFn}">
          <div class="task-check${isDone ? ' done' : ''}${isAuto ? ' auto' : ''}"
               onclick="${isAuto ? 'event.stopPropagation()' : `event.stopPropagation();toggleTask('${task.id}')`}">
            ${isDone ? '✓' : ''}
          </div>
          <div class="task-label${isDone ? ' done' : ''}">${escHtml(task.label)}</div>
          <span class="task-chevron${hasChildren ? ' has-children' : ''}">
            ${hasChildren ? '› ' + task.children.length : '›'}
          </span>
          <div class="task-icons" style="display:${editMode ? 'flex' : 'none'}">
            <button class="task-icon" onclick="event.stopPropagation();startEditTask('${task.id}')" title="Wijzigen">✏</button>
            <button class="task-icon" id="del-${task.id}"
              onclick="event.stopPropagation();confirmDeleteTask('${task.id}')" title="Verwijderen">🗑</button>
          </div>
        </div>`;
    }

    function selectTask(taskId) {
      selectedTaskId = taskId;
      rightPath = [];
      renderDetailPanel();
      expandPanel();
    }

    function navigateInto(taskId) {
      rightPath.push(taskId);
      renderDetailPanel();
      expandPanel();
    }

    function navigateRightTo(taskId, index) {
      rightPath = rightPath.slice(0, index + 1);
      renderDetailPanel();
      expandPanel();
    }

    function resetRightPanel() {
      selectedTaskId = null;
      rightPath = [];
      renderDetailPanel();
      expandPanel();
    }

    // ─── CRUD ────────────────────────────────────────────────────────────────
    function toggleTask(taskId) {
      if (!state.activePillar) return;
      const found = findTask(getPillar(state.activePillar).tasks, taskId);
      if (!found) return;
      found.task.done = !found.task.done;
      saveData();
      if (typeof renderCanvas === 'function') renderCanvas();
      renderDetailPanel();
      expandPanel();
    }

    function addTask(pillarId, parentId) {
      const newTask = { id: generateId(), label: '', done: false, phase: 1, children: [] };
      getPillar(pillarId).tasks.push(newTask);
      saveData();
      renderDetailPanel();
      expandPanel();
      setTimeout(() => startEditTask(newTask.id, true), 30);
    }

    function addSubtask() {
      // Stub — full implementation in Task 6
    }

    function startEditTask(taskId, isNew = false) {
      if (!state.activePillar) return;
      const found = findTask(getPillar(state.activePillar).tasks, taskId);
      if (!found) return;
      const task = found.task;
      const row = document.getElementById(`task-${taskId}`);
      if (!row) return;
      const labelEl = row.querySelector('.task-label');
      if (!labelEl) return;
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'task-label-input';
      input.value = task.label;
      input.placeholder = 'Taaknaam...';
      labelEl.replaceWith(input);
      input.focus();
      if (task.label) input.select();

      let saved = false;
      const save = () => {
        if (saved) return;
        saved = true;
        const v = input.value.trim();
        if (!v && isNew) { confirmDeleteTask(taskId, true); return; }
        task.label = v || task.label;
        saveData();
        renderDetailPanel();
        expandPanel();
      };
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); save(); }
        if (e.key === 'Escape') {
          saved = true;
          if (isNew) { confirmDeleteTask(taskId, true); }
          else { renderDetailPanel(); expandPanel(); }
        }
      });
      input.addEventListener('blur', save);
    }

    const _deleteConfirm = new Set();

    function confirmDeleteTask(taskId, silent = false) {
      if (silent) { deleteTask(taskId, true); return; }
      const btn = document.getElementById(`del-${taskId}`);
      if (!btn) return;
      if (_deleteConfirm.has(taskId)) {
        deleteTask(taskId);
        _deleteConfirm.delete(taskId);
      } else {
        _deleteConfirm.add(taskId);
        btn.classList.add('delete-confirm');
        btn.title = 'Nogmaals klikken bevestigt verwijdering';
        setTimeout(() => {
          _deleteConfirm.delete(taskId);
          const b = document.getElementById(`del-${taskId}`);
          if (b) { b.classList.remove('delete-confirm'); b.title = 'Verwijderen'; }
        }, 2500);
      }
    }

    function deleteTask(taskId, silent = false) {
      if (!state.activePillar) return;
      const p = getPillar(state.activePillar);
      removeTaskById(p.tasks, taskId);
      // Reset navigation state if deleted task was selected
      if (selectedTaskId === taskId) { selectedTaskId = null; rightPath = []; }
      saveData();
      if (typeof renderCanvas === 'function') renderCanvas();
      renderDetailPanel();
      if (!silent) expandPanel();
    }

    // ─── Roadmap ─────────────────────────────────────────────────────────────
    const PILLAR_TAG = { brand: 'tag-brand', website: 'tag-website', automation: 'tag-automation' };

    function renderRoadmap() {
      const container = document.getElementById('roadmap-container');
      container.innerHTML = state.phases.map((phase, idx) => {
        const isLast = idx === state.phases.length - 1;
        const tasks = state.pillars.flatMap(p =>
          p.tasks.filter(t => t.phase === phase.id).map(t => ({ ...t, pillarId: p.id }))
        );
        const noTasks = tasks.length === 0;

        return `
          <div class="phase-item">
            <div class="phase-marker">
              <div class="phase-dot${noTasks ? ' future' : ''}">${phase.id}</div>
              ${!isLast ? '<div class="phase-connector"></div>' : ''}
            </div>
            <div class="phase-content">
              <div class="phase-name-label${noTasks ? ' future' : ''}">${escHtml(phase.label)}</div>
              <div class="phase-tags">
                ${noTasks
                  ? '<span class="tag-empty">Geen taken toegewezen</span>'
                  : tasks.map(t =>
                    `<span class="phase-tag ${t.done ? 'tag-done' : PILLAR_TAG[t.pillarId]}">${escHtml(t.label)}</span>`
                  ).join('')}
              </div>
            </div>
          </div>`;
      }).join('');
    }

    // ─── View Toggle ─────────────────────────────────────────────────────────
    function switchView(view) {
      const dash = document.getElementById('dashboard-view');
      const road = document.getElementById('roadmap-view');
      const btns = document.querySelectorAll('.toggle-btn');
      if (view === 'dashboard') {
        dash.style.display = 'block';
        road.style.display = 'none';
        btns[0].classList.add('active');
        btns[1].classList.remove('active');
      } else {
        dash.style.display = 'none';
        road.style.display = 'block';
        btns[1].classList.add('active');
        btns[0].classList.remove('active');
        // Simple legend until renderRoadmapLegend() is implemented in Task 8
        const legend = document.getElementById('roadmap-legend');
        if (legend && typeof renderRoadmapLegend === 'function') {
          renderRoadmapLegend();
        } else if (legend) {
          legend.innerHTML = state.pillars.map(p =>
            `<span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:rgba(245,240,232,0.5);margin-right:12px">
              <span style="width:8px;height:8px;border-radius:50%;background:${escHtml(p.color)};display:inline-block"></span>
              ${escHtml(p.icon)} ${escHtml(p.label)}
            </span>`
          ).join('');
        }
        renderRoadmap();
      }
    }

    // ─── Reset ───────────────────────────────────────────────────────────────
    function resetData() {
      if (!confirm('Alle voortgang wissen en terug naar de standaard taken? Dit kan niet ongedaan worden gemaakt.')) return;
      localStorage.removeItem(STORAGE_KEY_V2);
      localStorage.removeItem(STORAGE_KEY_V1);
      state = deepClone(DEFAULT_DATA);
      editMode = false;
      document.getElementById('edit-toggle-btn').style.display = '';
      document.getElementById('edit-done-btn').style.display = 'none';
      document.getElementById('add-pillar-node').style.display = 'none';
      init();
    }

    // ─── Init ────────────────────────────────────────────────────────────────
    let selectedTaskId = null;
    let rightPath = [];

    function init() {
      state = loadData();
      switchView('dashboard');
      renderCanvas();
      if (state.activePillar) {
        selectedTaskId = null;
        rightPath = [];
        renderDetailPanel();
        expandPanel();
      }
    }

    // ─── Service Worker ──────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .catch(err => console.warn('SW registration failed:', err));
      });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
